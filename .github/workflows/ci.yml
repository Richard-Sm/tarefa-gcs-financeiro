ame: CI - Integracao e Qualidade

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integracao-continua:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar o PHP 8.3
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer

    - name: Instalar dependências (Composer)
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Preparar ambiente (ficheiro .env)
      run: |
        cp .env.example .env
        php artisan key:generate
        touch database/database.sqlite

    - name: Revisão de Qualidade de Código (Laravel Pint)
      run: ./vendor/bin/pint --test || true

    - name: Executar Testes Automatizados e Estatísticas
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: php artisan test
